<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta property="og:title" content="Tailgators 3v3 Live Rosters">
    <meta property="og:description" content="Check this week's teams, game status, beer duty, and the tailgate weather forecast.">
    <meta property="og:image" content="https://docs.google.com/presentation/d/1NMtaVe0CAwAQhGF8sC2sOI_tAyWZXUp1TOmw3ySx0m8/export/png">
    <meta property="og:type" content="website">

    <title>Tailgators 3v3 🏒</title>
    <style>
        :root {
            --team-red: #C8102E;
            --team-blue: #0046A0;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--dark-bg); color: var(--text-main); margin: 0; padding: 0; overflow-x: hidden; }
        
        #weather-banner { background: #1e3a8a; padding: 8px; text-align: center; border-bottom: 2px solid #3b82f6; }
        .weather-info { font-size: 1.1rem; font-weight: 800; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .weather-detail { font-size: 0.7rem; color: #bfdbfe; text-transform: uppercase; letter-spacing: 1px; }

        .header { text-align: center; padding: 10px 5px; background: #0f172a; }
        .header h1 { margin: 0; font-size: 1.3rem; font-weight: 900; color: #38bdf8; text-transform: uppercase; }
        .loc-time { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; margin-top: 2px; }
        .date-badge { font-size: 0.85rem; margin-top: 6px; color: #f1f5f9; font-weight: 700; display: inline-block; background: rgba(56, 189, 248, 0.1); padding: 2px 10px; border-radius: 4px; }
        
        /* Last Result Badge */
        .last-result-badge { display: none; background: #334155; color: #fcd34d; padding: 4px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin: 8px auto 0; border: 1px solid #475569; width: max-content; }

        .container { max-width: 500px; margin: 0 auto; padding: 8px 12px; }

        .roster-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 8px; transition: opacity 0.3s ease; }
        .team-card { border-radius: 10px; padding: 10px; background: var(--card-bg); border-top: 5px solid; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .team-red { border-top-color: var(--team-red); }
        .team-blue { border-top-color: var(--team-blue); }
        
        .team-title { text-align: center; font-weight: 800; font-size: 0.8rem; margin: 0 0 6px 0; padding-bottom: 4px; border-bottom: 1px solid #334155; }
        
        .player-row { padding: 5px 4px; font-weight: 600; font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.03); display: flex; justify-content: space-between; transition: opacity 0.3s; }
        .goalie-row { color: #fcd34d; border-bottom: none; padding-top: 6px; font-weight: 800; }

        /* Faded Draft Mode Class */
        .draft-mode .player-row { opacity: 0.4; }
        .draft-mode .team-title { opacity: 0.7; }

        #status-bar { margin: 4px 0 10px; padding: 6px; border-radius: 6px; text-align: center; font-weight: 800; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.5px; }
        .status-locked { background: #059669; }
        .status-draft { background: #991b1b; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .detail-box { background: var(--card-bg); padding: 8px; border-radius: 8px; text-align: center; border-bottom: 2px solid #fcd34d; }
        .label { color: var(--text-muted); font-size: 0.6rem; text-transform: uppercase; font-weight: 800; margin-bottom: 1px; display: block; }
        .value { font-weight: 700; font-size: 0.85rem; }

        .loader { text-align: center; padding: 80px 20px; color: var(--text-muted); }
    </style>
</head>
<body>

<div id="weather-banner">
    <div class="weather-info">
        <span id="weather-icon">📡</span>
        <span id="weather-temp">--</span>
    </div>
    <div class="weather-detail">Tailgate Forecast 🍻</div>
</div>

<div class="header">
    <h1>Tailgators 3v3 🏒</h1>
    <div class="loc-time">8:15 PM @ Evolution Ice, Dorval</div>
    <div class="date-badge" id="game-date">📅 --</div>
    <div class="last-result-badge" id="last-result"></div>
</div>

<div class="container" id="app-content" style="display: none;">
    
    <div class="roster-grid" id="roster-grid">
        <div class="team-card team-red">
            <h3 class="team-title">RED 🔴</h3>
            <div id="red-roster"></div>
        </div>
        <div class="team-card team-blue">
            <h3 class="team-title">BLUE 🔵</h3>
            <div id="blue-roster"></div>
        </div>
    </div>

    <div id="status-bar" class="status-draft">FETCHING...</div>

    <div class="info-grid">
        <div class="detail-box">
            <span class="label">Referee 🦓</span>
            <span class="value" id="ref-name">--</span>
        </div>
        <div class="detail-box">
            <span class="label">Beer Duty 🍺</span>
            <span class="value" id="beer-duty">--</span>
        </div>
    </div>
</div>

<div class="loader" id="loader">Lacing up... 🚨</div>

<script>
    // ⬇️ UPDATE THIS URL WITH YOUR GOOGLE WEB APP URL ⬇️
    const scriptURL = 'https://script.google.com/macros/s/AKfycbw0p03VCOsjERIkqShldPMYp07UJ7L_SvB5GyVtwprIOStY6GrIvjmmyh98C1rTvAew/exec';

    function getWeatherEmoji(code) {
        if (code === 0) return '🌕';
        if (code <= 3) return '☁️';
        if (code >= 51) return '🌧️';
        return '✨';
    }

    async function getTailgateWeather(apiDate) {
        if (!apiDate) return;
        try {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=45.4473&longitude=-73.7431&hourly=temperature_2m,weathercode&timezone=America%2FNew_York&start_date=${apiDate}&end_date=${apiDate}`;
            const res = await fetch(url);
            const data = await res.json();
            const temp9pm = Math.round(data.hourly.temperature_2m[21]);
            const temp11pm = Math.round(data.hourly.temperature_2m[23]);
            const condition = data.hourly.weathercode[22];
            document.getElementById('weather-icon').innerText = getWeatherEmoji(condition);
            document.getElementById('weather-temp').innerText = `${temp9pm}°C → ${temp11pm}°C`;
        } catch (e) {
            document.getElementById('weather-temp').innerText = "Weather N/A";
        }
    }

    async function loadGameData() {
        try {
            const response = await fetch(scriptURL);
            const data = await response.json();
            
            const statusBar = document.getElementById('status-bar');
            const rosterGrid = document.getElementById('roster-grid');
            
            // Handle Status & the "Draft Fade"
            if (data.settings.status === 'LOCKED') {
                statusBar.innerText = '🔒 Rosters Locked';
                statusBar.className = 'status-locked';
                rosterGrid.classList.remove('draft-mode');
            } else {
                statusBar.innerText = '⏳ Generating Teams...';
                statusBar.className = 'status-draft';
                rosterGrid.classList.add('draft-mode'); // Fades the names
            }

            // Handle Last Result Display
            const resultBadge = document.getElementById('last-result');
            if (data.settings.lastResult && data.settings.lastResult !== "") {
                resultBadge.innerText = `🏆 Prev: ${data.settings.lastResult}`;
                resultBadge.style.display = 'inline-block';
            } else {
                resultBadge.style.display = 'none';
            }

            document.getElementById('game-date').innerText = `📅 ${data.settings.displayDate}`;
            document.getElementById('ref-name').innerText = data.settings.referee;
            document.getElementById('beer-duty').innerText = data.settings.beer;

            getTailgateWeather(data.settings.apiDate);

            const renderRoster = (team, elementId) => {
                let html = '';
                team.forEach((p, i) => {
                    const isGoalie = (i === team.length - 1);
                    html += `
                        <div class="player-row ${isGoalie ? 'goalie-row' : ''}">
                            <span>${p}</span>
                            <span>${isGoalie ? '🥅' : ''}</span>
                        </div>`;
                });
                document.getElementById(elementId).innerHTML = html;
            };

            renderRoster(data.teamRed, 'red-roster');
            renderRoster(data.teamBlue, 'blue-roster');
            document.getElementById('loader').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
        } catch (error) {
            document.getElementById('loader').innerText = "Connection Error ❌";
        }
    }
    loadGameData();
</script>
</body>
</html>
